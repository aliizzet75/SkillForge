version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: skillforge-postgres
    environment:
      POSTGRES_USER: skillforge
      POSTGRES_PASSWORD: skillforge123
      POSTGRES_DB: skillforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - skillforge-network

  redis:
    image: redis:7-alpine
    container_name: skillforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - skillforge-network

  neo4j:
    image: neo4j:5
    container_name: skillforge-neo4j
    environment:
      NEO4J_AUTH: neo4j/lexwolf123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - skillforge-network

volumes:
  postgres_data:
  redis_data:
  neo4j_data:

networks:
  skillforge-network:
    driver: bridge
