name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger staging redeploy
        run: |
          curl -sf -X POST http://187.124.28.216:3002 \
            -H "Content-Type: application/json" \
            -d '{"event":"push","branch":"main"}' || echo "Webhook sent"
