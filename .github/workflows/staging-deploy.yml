name: Build & Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://187.124.28.216:5001
          NEXT_PUBLIC_SIGNALR_URL: http://187.124.28.216:5001/hubs/game
          NEXT_PUBLIC_BUILD_TIME: ${{ github.run_id }}
        run: |
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "export const BUILD_TIME = '$BUILD_TIME';" > src/lib/build-info.ts
          cat src/lib/build-info.ts
          npm install
          npm run build

      - name: Build Backend
        working-directory: backend
        run: |
          dotnet publish SkillForge.Api/SkillForge.Api.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o /tmp/backend-publish

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy tars to VPS
        run: |
          tar -C frontend/.next -czf /tmp/frontend-build.tar.gz .
          tar -C /tmp/backend-publish -czf /tmp/backend-publish.tar.gz .
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /tmp/skillforge-artifacts"
          scp /tmp/frontend-build.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/skillforge-artifacts/
          scp /tmp/backend-publish.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/skillforge-artifacts/

      - name: Extract inside container
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "docker cp /tmp/skillforge-artifacts/frontend-build.tar.gz skillforge-staging:/tmp/"
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "docker cp /tmp/skillforge-artifacts/backend-publish.tar.gz skillforge-staging:/tmp/"
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "docker exec skillforge-staging bash -c 'rm -rf /app/repo/frontend/.next && mkdir -p /app/repo/frontend/.next && tar -C /app/repo/frontend/.next -xzf /tmp/frontend-build.tar.gz && rm /tmp/frontend-build.tar.gz && echo done: \$(ls /app/repo/frontend/.next | wc -l) items'"
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "docker exec skillforge-staging bash -c 'rm -rf /app/backend-publish && mkdir -p /app/backend-publish && tar -C /app/backend-publish -xzf /tmp/backend-publish.tar.gz && rm /tmp/backend-publish.tar.gz && echo done'"

      - name: Restart services
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "docker exec skillforge-staging bash -c 'kill \$(cat /tmp/frontend.pid 2>/dev/null) 2>/dev/null || true; sleep 1; cd /app/repo/frontend && PORT=3001 nohup npm start >> /var/log/frontend.log 2>&1 & echo \$! > /tmp/frontend.pid && echo Frontend PID: \$(cat /tmp/frontend.pid)'"
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "docker exec skillforge-staging bash -c 'kill \$(cat /tmp/backend.pid 2>/dev/null) 2>/dev/null || true; sleep 1; ASPNETCORE_URLS=http://0.0.0.0:5001 ConnectionStrings__DefaultConnection=\"Host=skillforge-staging-db;Port=5432;Database=skillforge;Username=skillforge;Password=skillforge123\" nohup /app/backend-publish/SkillForge.Api >> /var/log/backend.log 2>&1 & echo \$! > /tmp/backend.pid && echo Backend PID: \$(cat /tmp/backend.pid)'"
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "rm -rf /tmp/skillforge-artifacts"
          echo "[deploy] Done."
