name: Build & Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://187.124.28.216:5001
          NEXT_PUBLIC_SIGNALR_URL: http://187.124.28.216:5001/hubs/game
        run: |
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          sed -i "s|process.env.NEXT_PUBLIC_BUILD_TIME|'$BUILD_TIME'|g" src/app/layout.tsx
          grep "BUILD_TIME" src/app/layout.tsx
          npm install
          npm run build

      - name: Build Backend
        working-directory: backend
        run: |
          dotnet publish SkillForge.Api/SkillForge.Api.csproj             -c Release             -r linux-x64             --self-contained false             -o /tmp/backend-publish

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy artifacts to VPS
        run: |
          tar -C frontend/.next -czf /tmp/frontend-build.tar.gz .
          tar -C /tmp/backend-publish -czf /tmp/backend-publish.tar.gz .
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "rm -rf /tmp/skillforge-artifacts && mkdir -p /tmp/skillforge-artifacts/frontend-build /tmp/skillforge-artifacts/backend-publish"
          scp /tmp/frontend-build.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/skillforge-artifacts/frontend-build.tar.gz
          scp /tmp/backend-publish.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/skillforge-artifacts/backend-publish.tar.gz
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "tar -C /tmp/skillforge-artifacts/frontend-build -xzf /tmp/skillforge-artifacts/frontend-build.tar.gz && tar -C /tmp/skillforge-artifacts/backend-publish -xzf /tmp/skillforge-artifacts/backend-publish.tar.gz"

      - name: Deploy on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "bash /home/claudeuser/deploy-skillforge.sh"
